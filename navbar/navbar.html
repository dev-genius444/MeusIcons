<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar menu</title>
    <link rel="stylesheet" href="navbar.css">
</head>

<body>
    <div class="navigation">
        <ul>
            <li class="list active">
                <a href="#">
                    <span class="icon">
                       <ion-icon name="home-outline"></ion-icon>
                    </span>
                </a>
            </li>
            <li class="list">
                <a href="#">
                    <span class="icon">
                       <ion-icon name="logo-twitter"></ion-icon>
                    </span>
                </a>
            </li>
            <li class="list">
                <a href="#">
                    <span class="icon">
                        <ion-icon name="notifications-outline"></ion-icon>
                    </span>
                </a>
            </li>
            <li class="list">
                <a href="#">
                    <span class="icon">
                        <ion-icon name="logo-tux"></ion-icon>
                    </span>
                </a>
            </li>
            <div class="indicator"> </div>
        </ul>
    </div>

    <script>
        const list = document.querySelectorAll('.list');
        
        // Array com as cores correspondentes para cada ícone
        const colors = ['#f97316', '#1d9bf0', '#22c55e', '#111827'];

        function activeLink(index){
            list.forEach((item) => item.classList.remove('active'));
            this.classList.add('active');
            
            // Muda a cor da variável do CSS dinamicamente
            document.documentElement.style.setProperty('--clr', colors[index]);
        }

        list.forEach((item, index) =>
            item.addEventListener('click', function() {
                activeLink.call(this, index);
            })
        );
    </script>

    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</body>

</html>
